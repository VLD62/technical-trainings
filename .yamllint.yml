extends: default

rules:
  line-length: disable
  document-start: disable
  truthy:
    check-keys: false
  comments:
    min-spaces-from-content: 1
  comments-indentation: disable
  # Allow flow mappings such as `{ get_param: x }` used in Heat/other templates.
  braces:
    min-spaces-inside: 0
    max-spaces-inside: 1
  indentation:
    spaces: consistent
    indent-sequences: whatever

ignore: |
  **/.terraform/
  # Helm chart templates contain Go templating and are not plain YAML.
  **/helm/**/templates/
