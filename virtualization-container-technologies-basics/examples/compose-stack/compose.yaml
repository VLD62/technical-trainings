services:
  app:
    build:
      context: ./app
    environment:
      PORT: "8000"
      TRAINING_MESSAGE: "hello through the Compose proxy"
    expose:
      - "8000"
    networks:
      - training
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000', timeout=2)"
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  proxy:
    image: nginx:stable-alpine
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "8081:80"
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - training
    restart: unless-stopped

networks:
  training:
    driver: bridge
