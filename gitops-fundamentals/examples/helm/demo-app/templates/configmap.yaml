apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "demo-app.fullname" . }}
  labels:
    {{- include "demo-app.labels" . | nindent 4 }}
data:
  APP_ENV: {{ .Values.config.environment | quote }}
  APP_MESSAGE: {{ .Values.config.message | quote }}
  index.html: |
    <!doctype html>
    <html lang="en">
      <head>
        <meta charset="utf-8">
        <title>Helm GitOps Demo</title>
      </head>
      <body>
        <h1>Helm GitOps Demo</h1>
        <p>Environment: {{ .Values.config.environment }}</p>
        <p>{{ .Values.config.message }}</p>
      </body>
    </html>
