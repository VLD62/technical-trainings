replicaCount: 1

image:
  repository: nginx
  tag: 1.27.5-alpine
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

config:
  environment: default
  message: Hello from the Helm GitOps demo

resources:
  requests:
    cpu: 20m
    memory: 32Mi
  limits:
    cpu: 200m
    memory: 128Mi

podAnnotations: {}
podLabels: {}
