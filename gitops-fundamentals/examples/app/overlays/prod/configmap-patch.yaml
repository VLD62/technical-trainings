apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-app-config
data:
  APP_ENV: production
  APP_MESSAGE: Hello from the production environment
  index.html: |
    <!doctype html>
    <html lang="en">
      <head>
        <meta charset="utf-8">
        <title>GitOps Demo — Production</title>
      </head>
      <body>
        <h1>GitOps Demo</h1>
        <p>Environment: production</p>
        <p>Hello from the production environment</p>
      </body>
    </html>
