apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: gitops-demo-prod

resources:
  - ../../base

commonLabels:
  environment: production

patches:
  - path: deployment-patch.yaml
  - path: configmap-patch.yaml

images:
  - name: nginx
    newName: nginx
    newTag: 1.27.5-alpine
