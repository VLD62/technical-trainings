apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-app-config
data:
  APP_ENV: development
  APP_MESSAGE: Hello from the development environment
  index.html: |
    <!doctype html>
    <html lang="en">
      <head>
        <meta charset="utf-8">
        <title>GitOps Demo — Development</title>
      </head>
      <body>
        <h1>GitOps Demo</h1>
        <p>Environment: development</p>
        <p>Hello from the development environment</p>
      </body>
    </html>
