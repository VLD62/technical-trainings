apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-app-config
data:
  APP_ENV: staging
  APP_MESSAGE: Hello from the staging environment
  index.html: |
    <!doctype html>
    <html lang="en">
      <head>
        <meta charset="utf-8">
        <title>GitOps Demo — Staging</title>
      </head>
      <body>
        <h1>GitOps Demo</h1>
        <p>Environment: staging</p>
        <p>Hello from the staging environment</p>
      </body>
    </html>
