apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: demo-app-environments
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error

  generators:
    - list:
        elements:
          - environment: dev
            namespace: gitops-demo-dev
            automated: "true"
          - environment: staging
            namespace: gitops-demo-staging
            automated: "true"
          - environment: prod
            namespace: gitops-demo-prod
            automated: "false"

  template:
    metadata:
      name: "demo-app-{{.environment}}"
      labels:
        training.example/environment: "{{.environment}}"
    spec:
      project: training
      source:
        repoURL: https://github.com/REPLACE_ME/gitops-lab.git
        targetRevision: main
        path: "apps/demo-app/overlays/{{.environment}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{.namespace}}"
      syncPolicy:
        syncOptions:
          - CreateNamespace=true
          - PruneLast=true

  templatePatch: |
    {{- if eq .automated "true" }}
    spec:
      syncPolicy:
        automated:
          enabled: true
          prune: true
          selfHeal: true
          allowEmpty: false
    {{- end }}
