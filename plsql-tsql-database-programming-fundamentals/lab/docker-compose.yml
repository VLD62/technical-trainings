services:
  oracle:
    image: gvenzl/oracle-free:23-slim-faststart
    container_name: plsql-training-oracle
    environment:
      ORACLE_PASSWORD: ${ORACLE_PASSWORD}
      APP_USER: ${ORACLE_APP_USER}
      APP_USER_PASSWORD: ${ORACLE_APP_PASSWORD}
    ports:
      - "127.0.0.1:1521:1521"
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./oracle/init/01_initialize_training_schema.sh:/container-entrypoint-initdb.d/01_initialize_training_schema.sh:ro
      - ./oracle/init:/training/init:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    restart: unless-stopped

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: plsql-training-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: Developer
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
    ports:
      - "127.0.0.1:1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
      - ./sqlserver/init:/training/init:ro
    healthcheck:
      test:
        - CMD-SHELL
        - /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$${MSSQL_SA_PASSWORD}" -C -Q "SELECT 1" -b >/dev/null 2>&1
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    restart: unless-stopped

volumes:
  oracle-data:
  mssql-data:
