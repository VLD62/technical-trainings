services:
  mysql-server:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_bin
      - --log-bin-trust-function-creators=1
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h 127.0.0.1 -uroot -p"$${MYSQL_ROOT_PASSWORD}" --silent
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - zabbix-lab

  zabbix-server:
    image: zabbix/zabbix-server-mysql:alpine-${ZABBIX_IMAGE_VERSION}
    restart: unless-stopped
    environment:
      DB_SERVER_HOST: mysql-server
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    depends_on:
      mysql-server:
        condition: service_healthy
    ports:
      - "10051:10051"
    networks:
      - zabbix-lab

  zabbix-web:
    image: zabbix/zabbix-web-nginx-mysql:alpine-${ZABBIX_IMAGE_VERSION}
    restart: unless-stopped
    environment:
      DB_SERVER_HOST: mysql-server
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      ZBX_SERVER_HOST: zabbix-server
      PHP_TZ: ${PHP_TZ}
    depends_on:
      mysql-server:
        condition: service_healthy
      zabbix-server:
        condition: service_started
    ports:
      - "8080:8080"
    networks:
      - zabbix-lab

  zabbix-agent2:
    image: zabbix/zabbix-agent2:alpine-${ZABBIX_IMAGE_VERSION}
    restart: unless-stopped
    environment:
      ZBX_HOSTNAME: zabbix-server
      ZBX_SERVER_HOST: zabbix-server
      ZBX_SERVER_ACTIVE: zabbix-server
    depends_on:
      zabbix-server:
        condition: service_started
    networks:
      - zabbix-lab

volumes:
  mysql-data:

networks:
  zabbix-lab:
    driver: bridge
