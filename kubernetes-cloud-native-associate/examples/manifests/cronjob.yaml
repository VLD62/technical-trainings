apiVersion: batch/v1
kind: CronJob
metadata:
  name: time-check
  namespace: kcna-lab
spec:
  schedule: "*/10 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: time-check
              image: busybox:1.36
              command: ["sh", "-c", "date; echo KCNA training job completed"]
