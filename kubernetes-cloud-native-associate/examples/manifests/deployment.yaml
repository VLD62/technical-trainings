apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: kcna-lab
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: nginx:stable-alpine
          ports:
            - name: http
              containerPort: 80
          env:
            - name: TRAINING_MESSAGE
              valueFrom:
                configMapKeyRef:
                  name: web-config
                  key: training-message
            - name: DEMO_TOKEN
              valueFrom:
                secretKeyRef:
                  name: demo-secret
                  key: token
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
