---
- name: Collect and display basic system facts
  hosts: all
  gather_facts: true

  tasks:
    - name: Show operating system information
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }} runs {{ ansible_distribution }} {{ ansible_distribution_version }}"

    - name: Show default IPv4 address when available
      ansible.builtin.debug:
        msg: "Default IPv4: {{ ansible_default_ipv4.address | default('not available') }}"
